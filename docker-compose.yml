services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: metta-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
