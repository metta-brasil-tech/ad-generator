$schema_version: "1.0"
id: "DARK-OBJETO"
display_name: "Objeto-conceito 3D em destaque"
alias: ["dark-objeto"]
formato: "STORY"
banco_ref: ["1:1076"]
versao: "1.0"
status: "ativo"
marca:               "metta"

logica_visual: |
  Metáfora física do método. Objeto 3D em destaque (peça de dominó dourada,
  engrenagem) sobre fundo dark moody — ancora visualmente o conceito do
  método ou da etapa.

estrutura:
  zonas:
    center: "Objeto 3D destaque (40-50%) com mood lighting"
    bottom: "Headline branca + body + CTA"

composicao:
  background: "solid"
  background_color: "#0C161B"
  contrast: "medium"
  ritmo: "objeto-metáfora → headline (nomeia) → body (aplica) — conceito ancorado"
  proporcao: {headline_area: "20-25%", image_area: "40-50%", body_area: "10-15%"}
  ornament: "none"

typography:
  headline: {role: "title-medium", family: "SF Pro", style: "Expanded Heavy",
    weight: 870, stretch_pct: 132, size_range: [56, 76], line_height_pct: 95,
    letter_spacing_pct: -0.5, text_case: "UPPER"}
  body: {role: "body-medium", family: "SF Pro", style: "Expanded Regular",
    weight: 510, stretch_pct: 100, size_range: [24, 32], line_height_pct: 130, text_case: "sentence"}
  tag_eyebrow: {role: "label-large", family: "SF Pro", style: "Expanded Medium",
    weight: 540, stretch_pct: 132, size_range: [18, 22], line_height_pct: 100,
    letter_spacing_pct: 11, text_case: "UPPER"}
  cta: {role: "label-large", family: "SF Pro", style: "Expanded Bold",
    weight: 700, stretch_pct: 132, size_range: [22, 28], line_height_pct: 100, text_case: "UPPER"}

colors:
  bg_primary: "var(--metta-ref-palette-night-10)"
  fg_primary: "var(--metta-ref-palette-night-100)"
  accent: "var(--metta-sys-color-primary)"
  body_text: "var(--metta-ref-palette-night-85)"
  cta_bg: "var(--metta-sys-color-primary)"
  cta_text: "var(--metta-sys-color-on-primary)"

spacing: {safe_margin_x: 80, safe_margin_top: 100, safe_margin_bot: 120, gap_between_blocks: 32}
shape: {cta_radius: "var(--metta-sys-shape-corner-full)", card_radius: "var(--metta-sys-shape-corner-md)"}
composition_pattern: "dark-bg-single-object-3d"

image:
  required: true
  type: "object-3d-metaphor"
  placement: "center-top"
  filters: {saturation: -0.1, contrast: 0.3, overlay: "moody-rim-light"}
  ratio: "free"
  prompt_template_ref: "n/a — render 3D em Cinema 4D / Blender"
  reference_image: ["figma://1:1076"]

slots:
  - {name: "tag", role: "etapa_metodo", required: false, max_chars: 30,
     style_ref: "typography.tag_eyebrow", color_ref: "colors.accent", align: "left",
     position: {x: "80px", y: "100px"}}
  - {name: "headline", role: "nomear_conceito", required: true, max_chars: 80, max_lines: 4,
     style_ref: "typography.headline", color_ref: "colors.fg_primary", align: "left",
     position: {x: "80px", y: "after-image+48px"},
     accent_word: {allowed: true, max_words: 1, color_ref: "colors.accent"}}
  - {name: "body", role: "aplicacao", required: false, max_chars: 120, max_lines: 3,
     style_ref: "typography.body", color_ref: "colors.body_text", align: "left",
     position: {x: "80px", y: "after-headline+24px"}}
  - {name: "cta", role: "acao", required: true, max_chars: 24,
     style_ref: "typography.cta", color_ref: "colors.cta_text", bg_color_ref: "colors.cta_bg",
     component: "pill", position: {x: "80px", y: "bottom-130px"}}

quando_brilha:
  - "Método/protocolo com etapas — ancorar visualmente"
  - "Efeito cascata / efeito dominó / engrenagem"
  - "Sub-conceito do framework em mais profundidade"

funil_recomendado: ["MOFU", "BOFU"]
audiencia_recomendada: ["decisor_culto", "warm_buscando_metodo"]
teses_compativeis: ["metodo_etapas", "efeito_cascata", "framework_visual"]

anti_padroes:
  - "Tese sem objeto-conceito claro — não tem o que renderizar"
  - "Caso nominal (objeto dilui case)"
  - "Foto humana (não combina com objeto isolado)"

hibridizacoes_validas: ["DARK-COLAGEM (versão com múltiplos elementos)"]

embedding_text:
  intent: |
    Estilo da metáfora física isolada. Carrega método ou etapa via objeto
    3D ancorando o conceito (dominó, engrenagem). Funciona em MOFU/BOFU
    pra audiência buscando entender o método.
  visual_features: |
    Fundo dark #0C161B. Objeto 3D destaque centro-top com mood lighting
    (rim light dourado). Headline UPPER 56-76px branca com palavra amarela.
    Body cinza. CTA pill amarelo.

referencias_dna_completo: "design/banco-ads-figma.md#§5.13"
created: "2026-05-13"
updated: "2026-05-13"
maintainer: "Head de Design Metta"
