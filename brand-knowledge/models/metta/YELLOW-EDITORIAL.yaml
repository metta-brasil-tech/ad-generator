$schema_version: "1.0"
id: "YELLOW-EDITORIAL"
display_name: "Fundo amarelo + colagem P&B + número gigante"
alias: ["yellow-editorial"]
formato: "STORY"
banco_ref: ["1:957"]
versao: "1.0"
status: "ativo"
marca:               "metta"

logica_visual: |
  Big number como prova institucional com peso editorial. Colagem PB de
  executivos blur top dá contexto institucional sem competir com o número.
  Estética HBR/Bloomberg.

estrutura:
  zonas:
    top: "Colagem PB de executivos blurred top (35-40%)"
    center: "Número GIGANTE preto"
    bottom: "Body + CTA pill preto"

composicao:
  background: "solid"
  background_color: "#FFBE18"
  contrast: "extreme"
  ritmo: "contexto (colagem) → número (impacto) → ação — prova institucional"
  proporcao: {number_area: "40-50%", image_area: "30-35%", body_area: "10-15%"}
  ornament: "collage-pb-top"

typography:
  headline: {role: "display-hero", family: "SF Pro", style: "Expanded Heavy",
    weight: 870, stretch_pct: 132, size_range: [180, 280], line_height_pct: 88,
    letter_spacing_pct: -3, text_case: "UPPER"}
  body: {role: "body-large", family: "SF Pro", style: "Expanded Medium",
    weight: 510, stretch_pct: 100, size_range: [28, 36], line_height_pct: 130, text_case: "sentence"}
  tag_eyebrow: {role: "label-large", family: "SF Pro", style: "Expanded Medium",
    weight: 540, stretch_pct: 132, size_range: [18, 22], line_height_pct: 100,
    letter_spacing_pct: 11, text_case: "UPPER"}
  cta: {role: "label-large", family: "SF Pro", style: "Expanded Bold",
    weight: 700, stretch_pct: 132, size_range: [22, 28], line_height_pct: 100, text_case: "UPPER"}

colors:
  bg_primary: "var(--metta-sys-color-primary)"
  fg_primary: "var(--metta-ref-palette-night-10)"
  accent: "var(--metta-ref-palette-night-10)"
  body_text: "var(--metta-ref-palette-night-10)"
  cta_bg: "var(--metta-ref-palette-night-10)"
  cta_text: "var(--metta-ref-palette-night-100)"

spacing: {safe_margin_x: 80, safe_margin_top: 100, safe_margin_bot: 120, gap_between_blocks: 24}
shape: {cta_radius: "var(--metta-sys-shape-corner-full)", card_radius: "var(--metta-sys-shape-corner-md)"}
composition_pattern: "yellow-bg-big-number-collage"

image:
  required: true
  type: "collage-pb-blurred"
  placement: "top"
  filters: {saturation: -1, contrast: 0.3, overlay: "blur-3px"}
  ratio: "free"
  prompt_template_ref: "image-prompts/_base.md"
  reference_image: ["figma://1:957"]

slots:
  - {name: "tag", role: "label", required: false, max_chars: 30,
     style_ref: "typography.tag_eyebrow", color_ref: "colors.fg_primary", align: "left",
     position: {x: "80px", y: "80px"}}
  - {name: "headline", role: "big_number", required: true, max_chars: 12, max_lines: 1,
     style_ref: "typography.headline", color_ref: "colors.fg_primary", align: "left",
     position: {x: "80px", y: "after-image+48px"},
     description: "Número como protagonista (R$8,5bi, +1000, +47%)"}
  - {name: "body", role: "contexto_numero", required: true, max_chars: 120, max_lines: 3,
     style_ref: "typography.body", color_ref: "colors.body_text", align: "left",
     position: {x: "80px", y: "after-headline+24px"}}
  - {name: "cta", role: "acao", required: true, max_chars: 24,
     style_ref: "typography.cta", color_ref: "colors.cta_text", bg_color_ref: "colors.cta_bg",
     component: "pill", position: {x: "80px", y: "bottom-130px"}}

quando_brilha:
  - "Prova de mercado agregada (R$8,5bi, +1000 empresas)"
  - "% market share, ROI massivo"
  - "Posicionamento institucional com peso editorial"

funil_recomendado: ["MOFU", "BOFU", "retargeting"]
audiencia_recomendada: ["b2b_buscando_credibilidade", "decisor_data_driven"]
teses_compativeis: ["big_number_prova", "market_share", "data_institucional"]

anti_padroes:
  - "Sem número concreto — estilo desperdiçado"
  - "Tese emocional pessoal (amarelo festivo não combina com dor)"

hibridizacoes_validas: ["A (versão dark sem amarelo)", "LOGO-WALL (versão com grade de logos)"]

embedding_text:
  intent: |
    Estilo do big number institucional. Carrega prova de mercado agregada
    via número gigante (faturamento, market share, volume). Tom HBR/Bloomberg
    editorial, não promo.
  visual_features: |
    Fundo amarelo total. Colagem PB de executivos blurred top. Número GIGANTE
    preto 180-280px ocupando metade do canvas. Body preto. CTA pill preto.

referencias_dna_completo: "design/banco-ads-figma.md#§5.6"
created: "2026-05-13"
updated: "2026-05-13"
maintainer: "Head de Design Metta"
