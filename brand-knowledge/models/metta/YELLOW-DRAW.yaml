$schema_version: "1.0"
id: "YELLOW-DRAW"
display_name: "Fundo amarelo + ilustração desenhada"
alias: ["yellow-draw"]
formato: "STORY"
banco_ref: ["1:624"]
versao: "1.0"
status: "ativo"
marca:               "metta"

logica_visual: |
  Descontração com substância. Ilustração desenhada à mão (gráfico, seta,
  curva) em fundo amarelo dá leveza editorial sem cair em cartoon.

estrutura:
  zonas:
    top: "Headline preta"
    center: "Ilustração desenhada à mão (gráfico/seta)"
    bottom: "Body + CTA pill preto"

composicao:
  background: "solid"
  background_color: "#FFBE18"
  contrast: "high"
  ritmo: "headline → ilustração concept → body — leve mas claro"
  proporcao: {headline_area: "25-30%", illustration_area: "40-50%", cta_area: "100-130px"}
  ornament: "hand-drawn-illustration"

typography:
  headline: {role: "title-medium", family: "SF Pro", style: "Expanded Heavy",
    weight: 870, stretch_pct: 132, size_range: [60, 80], line_height_pct: 95,
    letter_spacing_pct: -0.5, text_case: "UPPER"}
  body: {role: "body-medium", family: "SF Pro", style: "Expanded Regular",
    weight: 510, stretch_pct: 100, size_range: [24, 32], line_height_pct: 130, text_case: "sentence"}
  tag_eyebrow: {role: "label-large", family: "SF Pro", style: "Expanded Medium",
    weight: 540, stretch_pct: 132, size_range: [18, 22], line_height_pct: 100,
    letter_spacing_pct: 11, text_case: "UPPER"}
  cta: {role: "label-large", family: "SF Pro", style: "Expanded Bold",
    weight: 700, stretch_pct: 132, size_range: [22, 28], line_height_pct: 100, text_case: "UPPER"}

colors:
  bg_primary: "var(--metta-sys-color-primary)"
  fg_primary: "var(--metta-ref-palette-night-10)"
  accent: "var(--metta-ref-palette-night-10)"
  body_text: "var(--metta-ref-palette-night-10)"
  cta_bg: "var(--metta-ref-palette-night-10)"
  cta_text: "var(--metta-ref-palette-night-100)"

spacing: {safe_margin_x: 80, safe_margin_top: 120, safe_margin_bot: 120, gap_between_blocks: 32}
shape: {cta_radius: "var(--metta-sys-shape-corner-full)", card_radius: "var(--metta-sys-shape-corner-md)"}
composition_pattern: "yellow-bg-hand-drawn"

image:
  required: true
  type: "hand-drawn-illustration"
  placement: "center"
  filters: {saturation: 0, contrast: 0.1, overlay: "none"}
  ratio: "free"
  prompt_template_ref: "image-prompts/_base.md"
  reference_image: ["figma://1:624"]

slots:
  - {name: "headline", role: "conceito_leve", required: true, max_chars: 70, max_lines: 3,
     style_ref: "typography.headline", color_ref: "colors.fg_primary", align: "left",
     position: {x: "80px", y: "200px"}}
  - {name: "body", role: "explicacao", required: false, max_chars: 100, max_lines: 2,
     style_ref: "typography.body", color_ref: "colors.body_text", align: "left",
     position: {x: "80px", y: "after-illustration+24px"}}
  - {name: "cta", role: "acao", required: true, max_chars: 24,
     style_ref: "typography.cta", color_ref: "colors.cta_text", bg_color_ref: "colors.cta_bg",
     component: "pill", position: {x: "80px", y: "bottom-130px"}}

quando_brilha:
  - "Conceito visualmente simples ('modo sobrevivência')"
  - "Tese leve em audiência aberta"

funil_recomendado: ["TOFU"]
audiencia_recomendada: ["audiencia_cold_open"]
teses_compativeis: ["conceito_visualmente_simples", "tese_leve"]

anti_padroes:
  - "Tese pesada (amarelo + ilustração não comportam gravidade)"
  - "Caso nominal (ilustração à mão diminui credibilidade do caso)"

hibridizacoes_validas: ["YELLOW-BLOCO"]

embedding_text:
  intent: |
    Estilo da leveza editorial. Carrega conceito visualmente simples com
    ilustração desenhada à mão. Tom descontraído mas com substância — não
    cartoon, mas hand-drawn editorial.
  visual_features: |
    Fundo amarelo total. Headline preta UPPER 60-80px. Ilustração desenhada
    à mão (gráfico, seta, curva). Body preto. CTA pill preto com texto branco.

referencias_dna_completo: "design/banco-ads-figma.md#§5.5"
created: "2026-05-13"
updated: "2026-05-13"
maintainer: "Head de Design Metta"
